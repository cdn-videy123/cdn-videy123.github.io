  <title>Aunt making every moment count 🥴😅💦</title>
  <style>
    body {
      background-color: #000;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
    }

    .video-container {
      position: relative;
      width: 90%;
      max-width: 600px;
    }

    video {
      width: 100%;
      border-radius: 10px;
      display: block;
    }

    /* Banner iklan di dalam video */
    .ad-banner {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      animation: fadeIn 0.5s ease-in;
    }

    .ad-banner img {
      height: 30px;
      border-radius: 4px;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    .close-ad {
      background: red;
      border: none;
      color: #fff;
      font-size: 12px;
      padding: 3px 6px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
